<script>
/* ========= CREATE MESSAGE ========= */
var resultBox = document.createElement("div");
resultBox.id = "verificationMessage";
resultBox.style.textAlign = "center";
resultBox.style.fontSize = "15px";
resultBox.style.margin = "10px 0";
resultBox.style.padding = "10px";
resultBox.style.borderTop = "1px solid #ddd";
resultBox.style.borderBottom = "1px solid #ddd";

/* ========= PLACE MESSAGE ========= */
window.addEventListener("load", function() {
    var panelBody = document.querySelector(".panel-body");
    panelBody.insertBefore(resultBox, panelBody.firstChild);
});


/* ========= CNIC LIST ========= */
const validCNICs = [
    "31202-6789890-3",
    "12345-1234567-1",
    "42101-1111111-1"
];


/* ========= CAPTCHA ========= */
function generateCustomCaptcha() {
    let num1 = Math.floor(Math.random() * 10);
    let num2 = Math.floor(Math.random() * 10);

    window.customCaptchaAnswer = num1 + num2;

    document.getElementById("captchaQuestion").innerText = num1 + " + " + num2 + " =";
}

window.addEventListener("load", generateCustomCaptcha);

document.getElementById("refresh-captcha").addEventListener("click", function(e) {
    e.preventDefault();
    generateCustomCaptcha();
});


/* ========= FORM SUBMIT ========= */
document.getElementById("frm_submit").addEventListener("submit", function(e) {
    e.preventDefault();

    let enteredCNIC = document.getElementById("cnic").value;
    let enteredCaptcha = document.getElementById("captcha").value;

    // Captcha check
    if (enteredCaptcha != window.customCaptchaAnswer) {
        resultBox.style.color = "red";
        resultBox.innerText = "Invalid Captcha ❌";
        return;
    }

    // Hide form AFTER submit
    document.getElementById("frm_submit").style.display = "none";

    // CNIC result
    if (validCNICs.includes(enteredCNIC)) {
        resultBox.style.color = "black";
        resultBox.innerText = "This is a VERIFIED CNIC";
    } else {
        resultBox.style.color = "black";
        resultBox.innerText = "The data you are trying to access is invalid. Please use valid information to access required verification.";
    }
});
</script>
